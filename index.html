<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退職の切り出し方メーカー｜言い出せない人の台本・本音→建前・引き止め返し</title>
<meta name="description" content="辞めたいのに言い出せない人へ。退職の切り出し方（アポ・最初の一言）、退職理由の本音→建前変換、引き止めへの返し、円満退職の段取りと法律（民法627条ほか）を、選ぶだけで台本として出します。AI不使用・無料・コピペOK。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23FAF9F6'/><text x='32' y='47' font-size='34' text-anchor='middle' fill='%239C6B3F' font-family='serif'>退</text></svg>">
<link rel="canonical" href="https://chiiita.github.io/taishoku/">
<meta property="og:type" content="website">
<meta property="og:title" content="退職の切り出し方メーカー｜言い出せないあなたへ">
<meta property="og:description" content="切り出し方・退職理由の本音→建前・引き止め返し・段取りと法律。選ぶだけで台本が出る無料ツール。">
<meta property="og:url" content="https://chiiita.github.io/taishoku/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FAF9F6;--card:#FFFFFF;--ink:#1A1A1A;--ink-soft:#534E47;--sub:#8A857E;--rule:#E7E3DC;--rule-soft:#F0EDE6;
    --gold:#9C6B3F;--gold-tint:#F3EBE0;--radius:8px;--serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;--warn:#C2664F;--warn-tint:#F7ECEC;--ok:#5b9b6f;--ok-tint:#EAF3EC;}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.85;font-size:16px;letter-spacing:.012em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:720px;margin:0 auto;padding:0 22px 96px}
  header.hero{text-align:center;padding:48px 8px 16px}
  .kicker{font-size:.7rem;letter-spacing:.3em;color:var(--gold);font-weight:500;margin:0 0 14px;text-indent:.3em}
  .hero h1{font-family:var(--serif);font-weight:700;font-size:1.8rem;line-height:1.5;margin:0 0 12px;letter-spacing:.02em}
  .hero h1 .thin{font-size:1rem;display:block;color:var(--ink-soft);font-weight:500;margin-top:8px;letter-spacing:.04em}
  .hr-deco{width:40px;height:1px;background:var(--gold);margin:16px auto;opacity:.7}
  .hero p{color:var(--ink-soft);font-size:.86rem;margin:0}

  .tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:22px 0 4px}
  .tabs button{border:1px solid var(--rule);background:#fff;border-radius:999px;padding:9px 15px;font-size:.82rem;font-family:var(--sans);
    color:var(--sub);cursor:pointer;font-weight:600;transition:.15s;white-space:nowrap}
  .tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .panel{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:24px 22px;margin:16px 0}
  .sec-h{font-family:var(--serif);font-weight:700;font-size:1.05rem;margin:0 0 4px;letter-spacing:.02em}
  .sec-d{font-size:.8rem;color:var(--sub);margin:0 0 14px}
  .lbl{font-size:.78rem;color:var(--sub);font-weight:700;letter-spacing:.04em;margin:16px 0 8px}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:#fff;border:1px solid var(--rule);border-radius:999px;padding:8px 14px;font-size:.85rem;color:var(--ink-soft);cursor:pointer;transition:.15s;font-weight:500}
  .chip:hover{border-color:var(--gold);color:var(--gold)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  .cat-lead{font-size:.7rem;color:var(--gold);font-weight:700;letter-spacing:.08em;width:100%;margin:8px 0 2px}

  .copybox{background:#fff;border:1px solid var(--rule);border-radius:8px;padding:12px 14px;margin:8px 0;display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
  .copybox .ct{font-size:.95rem;line-height:1.8;color:var(--ink)}
  .copybox .ct .k{font-size:.7rem;color:var(--sub);display:block;margin-bottom:2px}

  .tone{padding:16px 0 4px;border-top:1px solid var(--rule-soft)}
  .tone:first-of-type{border-top:none}
  .tone-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
  .tone-name{display:flex;align-items:center;gap:10px}
  .dots{letter-spacing:2px;font-size:.7rem;color:var(--gold)}
  .tone-label{font-family:var(--sans);font-size:.84rem;font-weight:700;color:var(--ink)}
  .tone-note{font-size:.68rem;color:var(--sub)}
  .quote{position:relative;padding-left:18px;font-size:1rem;line-height:1.95;color:var(--ink)}
  .quote::before{content:"";position:absolute;left:0;top:.35em;bottom:.35em;width:2px;background:var(--gold);opacity:.55;border-radius:2px}
  .btn{background:transparent;border:1px solid var(--rule);border-radius:6px;padding:5px 12px;font-size:.72rem;cursor:pointer;color:var(--sub);font-weight:500;white-space:nowrap;transition:.18s;font-family:var(--sans)}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.done{border-color:var(--gold);color:var(--gold);background:var(--gold-tint)}

  .reframe{background:var(--ok-tint);border:1px solid #cfe6d7;border-radius:8px;padding:12px 14px;margin:14px 0 4px;font-size:.84rem;color:#2f6b46;line-height:1.8}
  .reframe.warn{background:var(--warn-tint);border-color:#ecd5cf;color:#9a3f2c}
  .badge-asis{display:inline-block;font-size:.68rem;background:var(--ok-tint);color:#2f6b46;border:1px solid #cfe6d7;border-radius:999px;padding:2px 10px;margin-bottom:8px;font-weight:700}
  .note{font-size:.78rem;color:var(--ink-soft);background:var(--rule-soft);border-radius:6px;padding:10px 12px;margin-top:10px;line-height:1.7}

  .law h4{font-family:var(--serif);font-size:.98rem;margin:18px 0 6px;color:var(--ink)}
  .law p,.law li{font-size:.86rem;color:var(--ink-soft);line-height:1.85}
  .law ol,.law ul{padding-left:1.2em;margin:6px 0}
  .lawcard{border:1px solid var(--rule);border-radius:8px;padding:12px 14px;margin:8px 0}
  .lawcard .ttl{font-weight:700;color:var(--ink);font-size:.9rem}
  .lawcard .src{font-size:.7rem;color:var(--sub);margin-top:4px}
  .escape{background:var(--gold-tint);border:1px solid #E6D6C2;border-radius:8px;padding:16px;margin:16px 0}
  .escape .h{font-family:var(--serif);font-weight:700;color:#7A4F2C;margin:0 0 6px}

  .tip{font-size:.8rem;color:var(--ink-soft);border:1px solid var(--rule);border-radius:8px;padding:18px 20px;margin:22px 0;line-height:1.9}
  .tip .tip-h{font-family:var(--serif);color:var(--gold);font-weight:600;display:block;margin-bottom:8px;font-size:.86rem}
  .tip b{color:var(--ink)}
  .cta{background:var(--gold-tint);border:1px solid #E6D6C2;border-radius:8px;padding:22px;margin:18px 0;text-align:center}
  .cta h3{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:#7A4F2C;margin:0 0 6px}
  .cta p{font-size:.82rem;color:var(--ink-soft);margin:0 0 14px}
  .cta a{display:inline-block;background:var(--gold);color:#fff;text-decoration:none;border-radius:999px;padding:10px 24px;font-size:.84rem;font-weight:700}
  footer{text-align:center;color:var(--sub);font-size:.7rem;margin-top:30px;line-height:2}
  .foot-rule{width:30px;height:1px;background:var(--rule);margin:0 auto 16px}
  .disc{font-size:.68rem;color:var(--sub);margin-top:8px}
  @media(max-width:480px){.wrap{padding:0 16px 80px}.hero h1{font-size:1.45rem}.panel{padding:20px 16px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <p class="kicker">TAISHOKU</p>
    <h1>辞めたいのに、言い出せないあなたへ<span class="thin">退職の切り出し方メーカー</span></h1>
    <div class="hr-deco"></div>
    <p>選ぶだけで、最初の一言から引き止め返しまで。今日、一歩を踏み出すための台本。</p>
  </header>

  <div class="tabs" id="tabs">
    <button data-tab="kirisashi" class="on">① 切り出す</button>
    <button data-tab="reason">② 理由を伝える</button>
    <button data-tab="pushback">③ 引き止めに返す</button>
    <button data-tab="law">④ 段取り・法律</button>
  </div>

  <div id="view"></div>

  <div class="cta" id="cta" style="display:none">
    <h3 id="ctaTitle"></h3><p id="ctaText"></p><a id="ctaLink" href="#" target="_blank" rel="noopener"></a>
  </div>

  <div class="tip">
    <span class="tip-h">大事なこと</span>
    退職は<b>法律で認められたあなたの権利</b>です（無期雇用なら申し出から2週間で成立／民法627条）。<br>
    人手不足や後任の不在は<b>会社の責任</b>であって、あなたが我慢する理由にはなりません。迷ったら「④段取り・法律」を後ろ盾に。
  </div>

  <footer>
    <div class="foot-rule"></div>
    退職の切り出し方メーカー ｜ お悩み解決ツール<br>
    <span class="disc">本ツールは一般的な情報提供で、法的助言ではありません。個別の事情は労働基準監督署・弁護士・労働組合等にご相談ください。AI不使用・ブラウザ内処理。</span>
  </footer>
</div>

<script src="data/kirisashi.js"></script>
<script src="data/reasons.js"></script>
<script src="data/pushback.js"></script>
<script>
(function(){
  const NOTE_URL="";const NOTE_TITLE="退職代行を使わず、自力で円満退職する完全テンプレ集";const NOTE_TEXT="切り出し〜引き止め返し〜トラブル対応〜逆算チェックリストを全部入りで。";
  const $=(s,el=document)=>el.querySelector(s);
  const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
  const esc=s=>String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
  const TONES=[{key:"soft",label:"やわらか",note:"感謝厚め・控えめ",dots:"●○○"},{key:"standard",label:"標準",note:"はっきり、でも穏やか",dots:"●●○"},{key:"firm",label:"きっぱり",note:"言い切る",dots:"●●●"}];
  function copyBtn(getText){const b=el("button","btn");b.textContent="コピー";b.onclick=()=>{const txt=getText();const ok=()=>{b.textContent="✓ コピー";b.classList.add("done");setTimeout(()=>{b.textContent="コピー";b.classList.remove("done");},1400);};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok,ok);}else{const ta=el("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy")}catch(e){}ta.remove();ok();}};return b;}
  function copyBox(kicker,text){const d=el("div","copybox");const ct=el("div","ct");ct.innerHTML=(kicker?`<span class="k">${esc(kicker)}</span>`:"")+esc(text);d.appendChild(ct);d.appendChild(copyBtn(()=>text));return d;}
  function toneBlock(obj,threat){const wrap=el("div");const tones=TONES.filter(t=>obj[t.key]);tones.forEach(t=>{const tn=el("div","tone");const head=el("div","tone-head");const nm=el("div","tone-name");nm.innerHTML=`<span class="dots">${t.dots}</span><span class="tone-label">${t.label}</span><span class="tone-note">${t.note}</span>`;head.appendChild(nm);head.appendChild(copyBtn(()=>obj[t.key]));const q=el("div","quote");q.textContent=obj[t.key];tn.appendChild(head);tn.appendChild(q);wrap.appendChild(tn);});return wrap;}

  const state={tab:"kirisashi",reasonId:null,pushId:null,situId:(typeof KIRISASHI!=='undefined'&&KIRISASHI[0])?KIRISASHI[0].id:null};
  const view=$("#view");

  // tabs
  $("#tabs").querySelectorAll("button").forEach(b=>{b.onclick=()=>{state.tab=b.dataset.tab;$("#tabs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.tab===state.tab));render();window.scrollTo({top:0,behavior:"smooth"});};});

  function render(){
    view.innerHTML="";
    if(state.tab==="kirisashi")renderKirisashi();
    else if(state.tab==="reason")renderReason();
    else if(state.tab==="pushback")renderPushback();
    else renderLaw();
    $("#cta").style.display="block";$("#ctaTitle").textContent=NOTE_TITLE;$("#ctaText").textContent=NOTE_TEXT;
    const a=$("#ctaLink");if(NOTE_URL){a.style.display="inline-block";a.href=NOTE_URL;a.textContent="noteで全部見る →";}else{a.style.display="none";}
  }

  function renderKirisashi(){
    const p=el("div","panel");
    p.innerHTML=`<div class="sec-h">① 切り出す</div><div class="sec-d">まず直属の上司に。アポは「退職」と言わず「相談」で。最初の一言は言い切るのがコツ。</div>`;
    p.innerHTML+=`<div class="lbl">まずアポを取る（コピーして送る/言う）</div>`;
    p.appendChild(copyBox("口頭で",APO.kuchi));
    p.appendChild(copyBox("メール件名",APO.mailSubject));
    p.appendChild(copyBox("メール本文",APO.mailBody));
    const lbl=el("div","lbl");lbl.textContent="次に、面談での最初の一言（状況を選ぶ）";p.appendChild(lbl);
    const chips=el("div","chips");
    KIRISASHI.forEach(k=>{const c=el("div","chip"+(k.id===state.situId?" on":""));c.textContent=k.situ;c.onclick=()=>{state.situId=k.id;render();};chips.appendChild(c);});
    p.appendChild(chips);
    const k=KIRISASHI.find(x=>x.id===state.situId)||KIRISASHI[0];
    if(k){const box=el("div");box.style.marginTop="12px";box.appendChild(toneBlock(k));if(k.note){const n=el("div","note");n.textContent="💡 "+k.note;box.appendChild(n);}p.appendChild(box);}
    view.appendChild(p);
  }

  function renderReason(){
    const p=el("div","panel");
    p.innerHTML=`<div class="sec-h">② 退職理由 本音→建前</div><div class="sec-d">本音を選ぶと、角が立たない建前を3トーンで。会社批判は出さず、自分のキャリア/生活を主語に。</div>`;
    const cats=[...new Set(REASONS.map(r=>r.cat))];
    const chips=el("div","chips");
    cats.forEach(cat=>{const lead=el("div","cat-lead");lead.textContent=cat;chips.appendChild(lead);
      REASONS.filter(r=>r.cat===cat).forEach(r=>{const c=el("div","chip"+(r.id===state.reasonId?" on":""));c.textContent=r.honne;c.onclick=()=>{state.reasonId=r.id;render();};chips.appendChild(c);});});
    p.appendChild(chips);
    const r=REASONS.find(x=>x.id===state.reasonId);
    if(r){const box=el("div");box.style.marginTop="14px";
      if(r.asis){const b=el("div");b.innerHTML=`<span class="badge-asis">✓ そのまま伝えてOK</span>`;box.appendChild(b);}
      box.appendChild(toneBlock(r));
      if(r.note){const n=el("div","note");n.textContent="💡 "+r.note;box.appendChild(n);}
      p.appendChild(box);
    }else{const h=el("div","sec-d");h.textContent="↑ 本音を選んでください。";p.appendChild(h);}
    view.appendChild(p);
  }

  function renderPushback(){
    const p=el("div","panel");
    p.innerHTML=`<div class="sec-h">③ 引き止めに返す</div><div class="sec-d">「感謝で受ける→決意は変えない→引き継ぎで誠意」が型。脅し系は毅然とでOK。</div>`;
    const chips=el("div","chips");
    PUSHBACK.forEach(pb=>{const c=el("div","chip"+(pb.id===state.pushId?" on":""));c.textContent=pb.type;c.onclick=()=>{state.pushId=pb.id;render();};chips.appendChild(c);});
    p.appendChild(chips);
    const pb=PUSHBACK.find(x=>x.id===state.pushId);
    if(pb){const box=el("div");box.style.marginTop="14px";
      const said=el("div","reframe"+(pb.threat?" warn":""));said.innerHTML=(pb.threat?"⚠️ ":"")+`「${esc(pb.said)}」と言われたら：`;box.appendChild(said);
      box.appendChild(toneBlock(pb));
      if(pb.note){const n=el("div","note");n.textContent=(pb.threat?"⚖️ ":"💡 ")+pb.note;box.appendChild(n);}
      p.appendChild(box);
    }else{const h=el("div","sec-d");h.textContent="↑ 言われた引き止めを選んでください。";p.appendChild(h);}
    view.appendChild(p);
  }

  function renderLaw(){
    const p=el("div","panel law");
    p.innerHTML=`<div class="sec-h">④ 円満退職の段取り・法律</div><div class="sec-d">不安を消す後ろ盾。ここは事実なのでトーン分けなし。</div>`;
    p.innerHTML+=`<h4>伝える順番</h4><ol>
      <li>直属の上司にアポ（「相談がある」）</li><li>面談で口頭で意思表示（言い切る）</li><li>退職日を合意</li>
      <li>退職届を提出</li><li>引き継ぎ（資料・マニュアル化）</li><li>関係者・取引先へ周知</li><li>備品返却・離職票等の受領</li></ol>`;
    p.innerHTML+=`<h4>退職願 と 退職届 の違い</h4>
      <div class="lawcard"><span class="ttl">退職願</span>＝合意退職の「お願い」。会社が承認する前なら撤回できる。</div>
      <div class="lawcard"><span class="ttl">退職届</span>＝確定的な意思表示。会社に到達すると原則撤回できない（強く辞めたい時はこちら）。</div>`;
    const tpl="退職届\n\n私事、\nこのたび一身上の都合により、来る〇年〇月〇日をもって退職いたします。\n\n〇年〇月〇日\n（所属）　（氏名）　㊞\n\n〇〇株式会社\n代表取締役　〇〇　殿";
    const tb=el("div");tb.innerHTML=`<h4>退職届の文面（コピーして使う）</h4>`;tb.appendChild(copyBox("",tpl));p.appendChild(tb);
    p.insertAdjacentHTML("beforeend",`<h4>法律の要点（正確に）</h4>
      <div class="lawcard"><span class="ttl">退職は2週間で成立</span>　期間の定めのない雇用は、申し出から2週間経過で契約終了。会社の承認は不要。<div class="src">民法627条1項（月給制でも2週間でOK＝旧規定は改正で廃止）</div></div>
      <div class="lawcard"><span class="ttl">就業規則「1ヶ月前」より民法が優先</span>　円満のため就業規則に沿うのが実務だが、2週間を超える予告を強制する規定は無効とされる方向。<div class="src">民法627条／裁判例</div></div>
      <div class="lawcard"><span class="ttl">有期契約でも辞められる</span>　原則は満了までだが、賃金不払い・ハラスメント・本人の病気・家族の介護等「やむを得ない事由」があれば期間途中でも退職可。<div class="src">民法628条</div></div>
      <div class="lawcard"><span class="ttl">有給は退職前に消化できる</span>　会社は取得自体を拒否できない。退職日が決まっていれば時季をずらせず、退職前消化は実質拒否できない。<div class="src">労働基準法39条</div></div>`);
    p.insertAdjacentHTML("beforeend",`<h4>即日退職・退職代行（正確に）</h4>
      <p>即日退職は原則できない（2週間ルール）。ただし<b>有給が2週間分以上残っていれば、申し出→残りを有給消化で実質的に翌日から出社しない</b>ことは可能（会社合意があれば即日も可）。</p>
      <p>退職代行の利用自体は違法ではないが、<b>民間業者が有給や退職日を「交渉」すると非弁行為（弁護士法72条）で違法になりうる</b>（伝言のみ可）。交渉が必要なら<b>労働組合運営・弁護士運営</b>を選ぶ。</p>`);
    p.insertAdjacentHTML("beforeend",`<h4>やってはいけない（円満を壊す）</h4>
      <ul><li>メール/LINEだけで一方的通告・バックレ（無断退職）</li><li>同僚に先に話す（うわさが先行）</li><li>繁忙期にいきなり／お酒の席で切り出す</li><li>不満や愚痴をぶつける・SNSに書く</li><li>引き継ぎ放棄</li></ul>`);
    const esc2=el("div","escape");esc2.innerHTML=`<div class="h">自分で言うのがつらい人へ</div>
